<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a new Modern Chess account to play online with friends." />
  <meta name="keywords" content="chess register, create account, chess signup, online chess" />
  <title>Register - Modern Chess</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="settings-enhanced.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join thousands of chess players</p>
      </div>

      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" name="username" required placeholder="Choose a username" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" name="email" required placeholder="Enter your email" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" autocomplete="new-password" required placeholder="Create a password">
        </div>

        <div class="form-group">
          <label for="reg-confirm-password">Confirm Password</label>
          <input type="password" id="reg-confirm-password" name="confirm-password" autocomplete="new-password" required placeholder="Confirm your password">
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="terms" name="terms" required autocomplete="off">
            <span>I agree to the <a href="terms.html" target="_blank" class="auth-link">Terms of Service</a></span>
          </label>
        </div>

        <button type="submit" class="auth-submit-btn">Create Account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html" class="auth-link">Sign In</a></p>
        <p><a href="index.html" class="auth-link">Back to Game</a></p>
      </div>
    </div>
  </div>

  <script src="encryption.js"></script>
  <script src="auth.js"></script>
</body>
</html>
