<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recent Updates - Modern Chess</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="profile.css" />
  <link rel="stylesheet" href="admin-features.css" />
  <link rel="stylesheet" href="updates.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-shell">
    <!-- HEADER -->
    <header class="top-bar">
      <div class="brand">
        <h1>Modern Chess</h1>
        <span class="tagline">Recent Updates</span>
      </div>

      <div class="top-right">
        <button id="back-to-game" class="pill-btn">
          <span class="pill-icon">←</span>
          <span class="pill-label">Back to Game</span>
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="layout">
      <section class="updates-section">
        <div class="updates-container">
          <h2>Latest Updates</h2>
          <div id="updates-list" class="updates-list">
            <!-- Updates will be loaded here -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- SCRIPTS -->
  <script src="encryption.js"></script>
  <script src="updates.js"></script>
</body>
</html>
